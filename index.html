<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hollow Dashboard</title>

<style>
:root{
  --bg:#000;
  --card:#1c1c1e;
  --line:#2c2c2e;
  --text:#fff;
  --sub:#98989f;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  max-width:430px;
  margin:auto;
  padding:20px;
}

.title{
  font-size:32px;
  font-weight:700;
  margin-bottom:20px;
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:20px;
  margin-bottom:16px;
}

.label{
  color:var(--sub);
  font-size:14px;
  margin-bottom:8px;
}

.big{
  font-size:72px;
  font-family:var(--mono);
  line-height:1;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}

.tile{
  background:var(--card);
  border-radius:18px;
  padding:16px;
}

.tile-value{
  font-size:28px;
  font-family:var(--mono);
  margin-top:8px;
}

.version-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.version-item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--line);
  padding-bottom:8px;
}

.status{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  color:var(--sub);
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#0f0;
}

canvas{
  width:100%;
  height:120px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="title">Dashboard</div>

<div class="card">
  <div class="label">Active Players</div>
  <div class="big" id="activeNow">0</div>

  <div class="grid">
    <div>
      <div class="label">Peak Today</div>
      <div class="tile-value" id="peakToday">0</div>
    </div>

    <div>
      <div class="label">All-Time Peak</div>
      <div class="tile-value" id="peakAlltime">0</div>
    </div>
  </div>
</div>

<div class="grid">
  <div class="tile">
    <div class="label">Today</div>
    <div class="tile-value" id="today">0</div>
  </div>

  <div class="tile">
    <div class="label">Week</div>
    <div class="tile-value" id="week">0</div>
  </div>

  <div class="tile">
    <div class="label">Month</div>
    <div class="tile-value" id="month">0</div>
  </div>

  <div class="tile">
    <div class="label">All Time</div>
    <div class="tile-value" id="alltime">0</div>
  </div>
</div>

<div class="card">
  <div class="label">Launcher Versions</div>

  <div class="version-list" id="versions"></div>

  <div class="status">
    <div class="dot"></div>
    <span>Realtime Sync Enabled</span>
  </div>
</div>

<canvas id="chart"></canvas>

<script type="module">

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getDatabase,
  ref,
  onValue,
  set
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBImlfiRQOoY5kWBU-YsSffKEYTjFJdDe8",
      authDomain: "hollow-launcher-api.firebaseapp.com",
      databaseURL: "https://hollow-launcher-api-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "hollow-launcher-api",
      storageBucket: "hollow-launcher-api.firebasestorage.app",
      messagingSenderId: "981071558548",
      appId: "1:981071558548:web:df8bcde1e1fd0a2cb80181",
      measurementId: "G-W6DM9YCQM4"
    };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ACTIVE_WINDOW = 5 * 60 * 1000;

let peakAlltime = 0;
let peakToday = 0;

const history = Array(30).fill(0);

function boundaries(){

  const now = new Date();

  return {

    today:
      new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate()
      ).getTime(),

    week:
      Date.now() - 7 * 86400000,

    month:
      new Date(
        now.getFullYear(),
        now.getMonth(),
        1
      ).getTime()
  };
}

function update(id,val){
  document.getElementById(id).textContent =
    Number(val).toLocaleString();
}

function drawChart(data){

  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');

  const w = canvas.width = canvas.offsetWidth;
  const h = canvas.height = 120;

  ctx.clearRect(0,0,w,h);

  const max = Math.max(...data,1);

  ctx.beginPath();

  data.forEach((v,i)=>{

    const x = (i/(data.length-1))*w;
    const y = h - (v/max)*(h-10);

    if(i===0){
      ctx.moveTo(x,y);
    }else{
      ctx.lineTo(x,y);
    }

  });

  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 2;
  ctx.stroke();
}

onValue(ref(db,'players'), snap => {

  const now = Date.now();

  const b = boundaries();

  let active = 0;
  let today = 0;
  let week = 0;
  let month = 0;
  let alltime = 0;

  const versions = {};

  if(snap.exists()){

    snap.forEach(child => {

      const data = child.val();

      if(!data) return;

      const ts = data.lastSeen;

      if(typeof ts !== 'number') return;

      alltime++;

      if(ts >= b.today) today++;
      if(ts >= b.week) week++;
      if(ts >= b.month) month++;

      if(now - ts <= ACTIVE_WINDOW){
        active++;
      }

      const version = data.version || "Unknown";

      versions[version] =
        (versions[version] || 0) + 1;

    });

  }

  history.shift();
  history.push(active);

  drawChart(history);

  if(active > peakAlltime){

    peakAlltime = active;

    set(
      ref(db,'metadata/peakAlltime'),
      active
    );
  }

  if(active > peakToday){

    peakToday = active;

    set(
      ref(db,'metadata/peakToday'),
      active
    );
  }

  update('activeNow', active);
  update('peakToday', peakToday);
  update('peakAlltime', peakAlltime);

  update('today', today);
  update('week', week);
  update('month', month);
  update('alltime', alltime);

  const versionsEl =
    document.getElementById('versions');

  versionsEl.innerHTML = '';

  Object.entries(versions)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([version,count])=>{

      const item =
        document.createElement('div');

      item.className = 'version-item';

      item.innerHTML = `
        <span>${version}</span>
        <span>${count}</span>
      `;

      versionsEl.appendChild(item);

    });

});

</script>

</body>
</html>
